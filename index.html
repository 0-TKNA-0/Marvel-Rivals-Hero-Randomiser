<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marvel Rivals Squad Randomizer</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1115;
    color: #e8e6e1;
    margin: 0;
    padding: 2rem 1rem;
    min-height: 100vh;
  }
  .container { max-width: 760px; margin: 0 auto; }
  h1 {
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 0.25rem;
    background: linear-gradient(135deg, #f4c430 0%, #e23636 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { color: #888780; font-size: 14px; margin: 0 0 1.5rem; }

  .player-count-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .player-count-label {
    font-size: 13px;
    color: #888780;
    font-weight: 500;
  }
  .player-count-buttons {
    display: flex;
    gap: 4px;
    background: #1a1d24;
    border: 1px solid #2a2e38;
    border-radius: 8px;
    padding: 3px;
  }
  .pc-btn {
    width: 34px;
    height: 30px;
    background: transparent;
    border: none;
    color: #888780;
    font-size: 14px;
    font-weight: 500;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pc-btn:hover { color: #e8e6e1; }
  .pc-btn.active {
    background: linear-gradient(135deg, #f4c430 0%, #e23636 100%);
    color: #ffffff;
  }

  .slots {
    display: grid;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .slots.cols-1 { grid-template-columns: 1fr; }
  .slots.cols-2 { grid-template-columns: 1fr 1fr; }
  .slots.cols-3 { grid-template-columns: repeat(3, 1fr); }

  .slot {
    background: #1a1d24;
    border: 1px solid #2a2e38;
    border-radius: 12px;
    padding: 1rem 0.75rem;
    text-align: center;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .slot.spinning .name, .slot.spinning .portrait { opacity: 0.55; }
  .player {
    font-size: 11px;
    color: #888780;
    margin: 0 0 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .portrait {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #2a2e38;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 600;
    color: #ffffff;
    overflow: hidden;
    transition: opacity 0.1s, transform 0.15s, box-shadow 0.15s;
    border: 2px solid #2a2e38;
    flex-shrink: 0;
    position: relative;
  }
  .portrait img { width: 100%; height: 100%; object-fit: cover; }
  .portrait.rerollable { cursor: pointer; }
  .portrait.rerollable:hover { transform: scale(1.08); box-shadow: 0 0 0 3px rgba(244,196,48,0.55); }
  .portrait.rerollable::after {
    content: "🎲";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    background: rgba(15,17,21,0.72);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .portrait.rerollable:hover::after { opacity: 1; }
  .portrait.role-vanguard { border-color: #378ADD; }
  .portrait.role-duelist { border-color: #E24B4A; }
  .portrait.role-strategist { border-color: #97C459; }
  .name {
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 8px;
    color: #ffffff;
    transition: opacity 0.1s;
    line-height: 1.2;
    word-break: break-word;
  }
  .role {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 500;
  }
  .role-vanguard { background: #0C447C; color: #B5D4F4; }
  .role-duelist { background: #791F1F; color: #F7C1C1; }
  .role-strategist { background: #27500A; color: #C0DD97; }
  .controls { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .btn-primary {
    flex: 1;
    padding: 12px 16px;
    font-size: 15px;
    font-weight: 500;
    background: linear-gradient(135deg, #f4c430 0%, #e23636 100%);
    color: #ffffff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:active { transform: scale(0.98); }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 0 12px;
  }
  .section-title { font-size: 14px; font-weight: 500; margin: 0; color: #ffffff; }
  .section-meta { font-size: 12px; color: #888780; }
  .mini-controls { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .mini-controls button {
    font-size: 12px;
    padding: 6px 12px;
    background: #1a1d24;
    color: #e8e6e1;
    border: 1px solid #2a2e38;
    border-radius: 6px;
    cursor: pointer;
  }
  .mini-controls button:hover { border-color: #444441; background: #21252e; }
  .role-group { margin-bottom: 1.25rem; }
  .role-label {
    font-size: 11px;
    font-weight: 500;
    color: #888780;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 10px;
  }
  .chips { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
  .chip {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 5px 10px 5px 5px;
    border-radius: 999px;
    border: 1px solid #2a2e38;
    background: #1a1d24;
    color: #e8e6e1;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .chip-portrait {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #2a2e38;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: #ffffff;
    overflow: hidden;
  }
  .chip-portrait img { width: 100%; height: 100%; object-fit: cover; }
  .chip-name { overflow: hidden; text-overflow: ellipsis; }
  .chip.off { opacity: 0.35; text-decoration: line-through; background: #14161b; }
  .chip:hover { border-color: #444441; }
  @media (max-width: 600px) {
    .slots.cols-2, .slots.cols-3 { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 400px) {
    .slots.cols-2, .slots.cols-3 { grid-template-columns: 1fr; }
  }
  .tabs {
    display: flex;
    gap: 4px;
    background: #1a1d24;
    border: 1px solid #2a2e38;
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 1.5rem;
  }
  .tab-btn {
    flex: 1;
    padding: 9px 16px;
    background: transparent;
    border: none;
    color: #888780;
    font-size: 14px;
    font-weight: 500;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: #e8e6e1; }
  .tab-btn.active {
    background: linear-gradient(135deg, #f4c430 0%, #e23636 100%);
    color: #ffffff;
  }
  .panel { display: none; }
  .panel.active { display: block; }
  .ban-slot {
    background: #170e0e;
    border: 1px solid #3d1515;
    border-radius: 12px;
    padding: 1rem 0.75rem;
    text-align: center;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .ban-slot.spinning .name,
  .ban-slot.spinning .portrait { opacity: 0.55; }
  .ban-label {
    font-size: 11px;
    color: #c0524f;
    margin: 0 0 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .portrait.role-banned { border-color: #c0524f; }
  .portrait.rerollable.role-banned:hover { box-shadow: 0 0 0 3px rgba(192,82,79,0.6); }

  /* ── Case-opening reel overlay ─────────────────────────────────────── */
  .reel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,10,14,0.97);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
    opacity: 1;
    transition: opacity 0.45s ease;
  }
  .reel-overlay.fading { opacity: 0; pointer-events: none; }
  .reel-cases {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .reel-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .reel-row-label {
    font-size: 11px;
    color: #888780;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    width: 58px;
    flex-shrink: 0;
    text-align: right;
  }
  .reel-viewport {
    flex: 1;
    height: 104px;
    overflow: hidden;
    border-radius: 6px;
    border: 1px solid #2a2e38;
    background: #0b0d12;
    position: relative;
  }
  /* Top/bottom pointer triangles */
  .reel-viewport::before,
  .reel-viewport::after {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
  }
  .reel-viewport::before { top: 0;    border-top:    10px solid #f4c430; }
  .reel-viewport::after  { bottom: 0; border-bottom: 10px solid #f4c430; }
  .reel-center-line {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    background: rgba(244,196,48,0.12);
    z-index: 3;
    pointer-events: none;
  }
  .reel-fade {
    position: absolute;
    top: 0; bottom: 0;
    width: 90px;
    z-index: 2;
    pointer-events: none;
  }
  .reel-fade-left  { left:  0; background: linear-gradient(to right, #0b0d12, transparent); }
  .reel-fade-right { right: 0; background: linear-gradient(to left,  #0b0d12, transparent); }
  .reel-strip {
    display: flex;
    align-items: center;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
    will-change: transform;
  }
  .reel-item {
    flex-shrink: 0;
    width: 110px;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    border-right: 1px solid #181b22;
  }
  .reel-item-portrait {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: #2a2e38;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    overflow: hidden;
    border: 2px solid #2a2e38;
    flex-shrink: 0;
  }
  .reel-item-portrait.role-vanguard   { border-color: #378ADD; }
  .reel-item-portrait.role-duelist    { border-color: #E24B4A; }
  .reel-item-portrait.role-strategist { border-color: #97C459; }
  .reel-item-portrait.role-banned     { border-color: #c0524f; }
  .reel-item-portrait img { width: 100%; height: 100%; object-fit: cover; }
  .reel-item-name {
    font-size: 10px;
    color: #444;
    text-align: center;
    line-height: 1.2;
    width: 96px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 4px;
  }
  .reel-item-highlighted {
    background: rgba(244,196,48,0.1);
  }
  .reel-item-highlighted .reel-item-portrait {
    box-shadow: 0 0 0 2px #f4c430, 0 0 22px rgba(244,196,48,0.45);
  }
  .reel-item-highlighted .reel-item-name { color: #f4c430; }
  .reel-item-ban-highlighted {
    background: rgba(192,82,79,0.1);
  }
  .reel-item-ban-highlighted .reel-item-portrait {
    box-shadow: 0 0 0 2px #c0524f, 0 0 22px rgba(192,82,79,0.45);
  }
  .reel-item-ban-highlighted .reel-item-name { color: #e07070; }

  /* CS mode toggle */
  .mode-row {
    display: flex;
    align-items: center;
    margin-bottom: 1.25rem;
  }
  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #888780;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  .mode-toggle:hover { color: #c8c6c1; }
  .mode-toggle input[type=checkbox] { display: none; }
  .toggle-track {
    width: 38px;
    height: 22px;
    background: #2a2e38;
    border-radius: 11px;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #555;
    transition: transform 0.2s, background 0.2s;
  }
  .mode-toggle input:checked + .toggle-track { background: linear-gradient(135deg, #f4c430, #e23636); }
  .mode-toggle input:checked + .toggle-track .toggle-thumb { transform: translateX(16px); background: #fff; }
  .mode-toggle input:checked ~ .toggle-label { color: #e8e6e1; }
</style>
</head>
<body>
<div class="container">
  <h1>Marvel Rivals Squad Randomizer</h1>
  <p class="subtitle">Roll random heroes for solo, duo, trio, all the way to a full 6-stack</p>

  <div class="tabs">
    <button class="tab-btn active" data-tab="squad">🎲 Squad</button>
    <button class="tab-btn" data-tab="bans">🚫 Bans</button>
  </div>

  <div class="mode-row">
    <label class="mode-toggle" id="modeToggle">
      <input type="checkbox" id="csModeCheck">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-label">CS Case Opening Mode</span>
    </label>
  </div>

  <div class="panel active" id="panel-squad">
  <div class="player-count-row">
    <span class="player-count-label">Players:</span>
    <div class="player-count-buttons" id="pcButtons">
      <button class="pc-btn" data-count="1">1</button>
      <button class="pc-btn active" data-count="2">2</button>
      <button class="pc-btn" data-count="3">3</button>
      <button class="pc-btn" data-count="4">4</button>
      <button class="pc-btn" data-count="5">5</button>
      <button class="pc-btn" data-count="6">6</button>
    </div>
  </div>

  <div class="slots cols-2" id="slotsContainer"></div>

  <div class="controls">
    <button class="btn-primary" id="rollBtn">🎲 Randomize squad &nbsp;<span style="opacity:0.7;font-size:12px;">(or press space)</span></button>
  </div>

  <div class="section-head">
    <p class="section-title">Character pool</p>
    <span class="section-meta" id="poolCount">— enabled</span>
  </div>

  <div class="mini-controls">
    <button id="enableAll">Enable all</button>
    <button id="disableAll">Disable all</button>
    <button data-role="Vanguard">Only vanguards</button>
    <button data-role="Duelist">Only duelists</button>
    <button data-role="Strategist">Only strategists</button>
  </div>

  <div id="poolContainer"></div>
  </div><!-- end panel-squad -->

  <div class="panel" id="panel-bans">
    <p class="subtitle" style="margin:0 0 1.25rem">Roll 3 characters to ban — uses the full roster regardless of your squad pool settings.</p>
    <div class="slots cols-3" id="banSlotsContainer"></div>
    <div class="controls">
      <button class="btn-primary" id="rollBansBtn">🚫 Randomize Bans &nbsp;<span style="opacity:0.7;font-size:12px;">(or press space)</span></button>
    </div>
  </div><!-- end panel-bans -->
</div>

<script>
  const A = (slug) => "https://rivalskins.com/wp-content/uploads/marvel-assets/ui/heroes/avatar/" + slug + "_avatar.png";

  const ROSTER = [
    // Vanguards (12)
    { name: "Deadpool (Vanguard)", role: "Vanguard", img: A("deadpool") },
    { name: "Angela", role: "Vanguard", img: A("angela") },
    { name: "Captain America", role: "Vanguard", img: A("captain-america") },
    { name: "Doctor Strange", role: "Vanguard", img: A("doctor-strange") },
    { name: "Emma Frost", role: "Vanguard", img: A("emma-frost") },
    { name: "Groot", role: "Vanguard", img: A("groot") },
    { name: "Hulk", role: "Vanguard", img: A("hulk") },
    { name: "Magneto", role: "Vanguard", img: A("magneto") },
    { name: "Peni Parker", role: "Vanguard", img: A("peni-parker") },
    { name: "Rogue", role: "Vanguard", img: A("rogue") },
    { name: "The Thing", role: "Vanguard", img: A("the-thing") },
    { name: "Thor", role: "Vanguard", img: A("thor") },
    { name: "Venom", role: "Vanguard", img: A("venom") },
    // Duelists (25)
    { name: "Black Cat", role: "Duelist", img: A("black_cat") },
    { name: "Black Panther", role: "Duelist", img: A("black-panther") },
    { name: "Black Widow", role: "Duelist", img: A("black-widow") },
    { name: "Blade", role: "Duelist", img: A("blade") },
    { name: "Daredevil", role: "Duelist", img: A("daredevil") },
    { name: "Deadpool", role: "Duelist", img: A("deadpool") },
    { name: "Elsa Bloodstone", role: "Duelist", img: A("elsa_bloodstone") },
    { name: "Hawkeye", role: "Duelist", img: A("hawkeye") },
    { name: "Hela", role: "Duelist", img: A("hela") },
    { name: "Human Torch", role: "Duelist", img: A("human-torch") },
    { name: "Iron Fist", role: "Duelist", img: A("iron-fist") },
    { name: "Iron Man", role: "Duelist", img: A("iron-man") },
    { name: "Magik", role: "Duelist", img: A("magik") },
    { name: "Mr. Fantastic", role: "Duelist", img: A("mister-fantastic") },
    { name: "Moon Knight", role: "Duelist", img: A("moon-knight") },
    { name: "Namor", role: "Duelist", img: A("namor") },
    { name: "Phoenix", role: "Duelist", img: A("phoenix") },
    { name: "Psylocke", role: "Duelist", img: A("psylocke") },
    { name: "Scarlet Witch", role: "Duelist", img: A("scarlet-witch") },
    { name: "Spider-Man", role: "Duelist", img: A("spider-man") },
    { name: "Squirrel Girl", role: "Duelist", img: A("squirrel-girl") },
    { name: "Star-Lord", role: "Duelist", img: A("star-lord") },
    { name: "Storm", role: "Duelist", img: A("storm") },
    { name: "The Punisher", role: "Duelist", img: A("the-punisher") },
    { name: "Winter Soldier", role: "Duelist", img: A("winter-soldier") },
    { name: "Wolverine", role: "Duelist", img: A("wolverine") },
    // Strategists (12)
    { name: "Deadpool (Strategist)", role: "Strategist", img: A("deadpool") },
    { name: "Adam Warlock", role: "Strategist", img: A("adam-warlock") },
    { name: "Cloak & Dagger", role: "Strategist", img: A("cloak-and-dagger") },
    { name: "Gambit", role: "Strategist", img: A("gambit") },
    { name: "Invisible Woman", role: "Strategist", img: A("invisible-woman") },
    { name: "Jeff the Land Shark", role: "Strategist", img: A("jeff-the-land-shark") },
    { name: "Loki", role: "Strategist", img: A("loki") },
    { name: "Luna Snow", role: "Strategist", img: A("luna-snow") },
    { name: "Mantis", role: "Strategist", img: A("mantis") },
    { name: "Rocket Raccoon", role: "Strategist", img: A("rocket-raccoon") },
    { name: "Ultron", role: "Strategist", img: A("ultron") },
    { name: "White Fox", role: "Strategist", img: A("white_fox") }
  ];

  const ROLE_COLORS = {
    Vanguard: "#185FA5",
    Duelist: "#A32D2D",
    Strategist: "#3B6D11"
  };
  const roleClass = {
    Vanguard: "role-vanguard",
    Duelist: "role-duelist",
    Strategist: "role-strategist"
  };

  // Cryptographically secure random number in [0, 1).
  // Uses the OS entropy pool via crypto.getRandomValues — genuinely
  // unpredictable, unlike Math.random()'s pseudo-random sequence.
  function cryptoRandom() {
    const buf = new Uint32Array(1);
    crypto.getRandomValues(buf);
    return buf[0] / 0x100000000;
  }

  const STORAGE_KEY = "mr_disabled_chars_v4";
  const COUNT_KEY   = "mr_player_count";
  const CS_MODE_KEY = "mr_cs_mode";
  const enabled = new Set(ROSTER.map(c => c.name));
  let playerCount = 2;
  let currentSquad = [];
  let csMode = false;

  // Load saved preferences
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const disabled = JSON.parse(saved);
      disabled.forEach(name => enabled.delete(name));
    }
    const savedCount = parseInt(localStorage.getItem(COUNT_KEY), 10);
    if (savedCount >= 1 && savedCount <= 6) playerCount = savedCount;
    csMode = localStorage.getItem(CS_MODE_KEY) === "1";
  } catch (e) {}

  function savePrefs() {
    try {
      const disabled = ROSTER.filter(c => !enabled.has(c.name)).map(c => c.name);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(disabled));
      localStorage.setItem(COUNT_KEY, String(playerCount));
      localStorage.setItem(CS_MODE_KEY, csMode ? "1" : "0");
    } catch (e) {}
  }

  function getInitials(name) {
    return name.split(/[\s&-]+/).filter(w => w.length > 0).slice(0, 2).map(w => w[0]).join("").toUpperCase();
  }

  function buildPortrait(character) {
    const wrap = document.createElement("div");
    wrap.style.width = "100%";
    wrap.style.height = "100%";
    wrap.style.display = "flex";
    wrap.style.alignItems = "center";
    wrap.style.justifyContent = "center";
    wrap.style.background = ROLE_COLORS[character.role];
    wrap.textContent = getInitials(character.name);

    const img = new Image();
    img.alt = character.name;
    img.onload = () => {
      wrap.textContent = "";
      wrap.style.background = "transparent";
      wrap.appendChild(img);
    };
    img.onerror = () => {};
    img.src = character.img;
    return wrap;
  }

  function renderSlots() {
    const container = document.getElementById("slotsContainer");
    container.innerHTML = "";
    container.className = "slots cols-" + (playerCount <= 2 ? playerCount : (playerCount === 4 ? 2 : 3));

    for (let i = 1; i <= playerCount; i++) {
      const slot = document.createElement("div");
      slot.className = "slot";
      slot.id = "slot" + i;
      slot.innerHTML =
        '<p class="player">Player ' + i + '</p>' +
        '<div class="portrait" id="portrait' + i + '">?</div>' +
        '<p class="name" id="name' + i + '">Press randomize</p>' +
        '<div><span class="role" id="role' + i + '" style="visibility:hidden">—</span></div>';
      container.appendChild(slot);
    }
  }

  function updateCount() {
    document.getElementById("poolCount").textContent =
      enabled.size + " of " + ROSTER.length + " enabled";
  }

  function renderPool() {
    const container = document.getElementById("poolContainer");
    container.innerHTML = "";
    const roles = ["Vanguard", "Duelist", "Strategist"];
    roles.forEach(role => {
      const list = ROSTER.filter(c => c.role === role).sort((a, b) => a.name.localeCompare(b.name));
      const group = document.createElement("div");
      group.className = "role-group";
      const label = document.createElement("p");
      label.className = "role-label";
      label.textContent = role + "s (" + list.length + ")";
      group.appendChild(label);
      const chips = document.createElement("div");
      chips.className = "chips";
      list.forEach(c => {
        const chip = document.createElement("div");
        chip.className = "chip" + (enabled.has(c.name) ? "" : " off");
        chip.title = c.name;

        const portrait = document.createElement("div");
        portrait.className = "chip-portrait";
        portrait.appendChild(buildPortrait(c));
        chip.appendChild(portrait);

        const nameSpan = document.createElement("span");
        nameSpan.className = "chip-name";
        nameSpan.textContent = c.name;
        chip.appendChild(nameSpan);

        chip.addEventListener("click", () => {
          if (enabled.has(c.name)) enabled.delete(c.name);
          else enabled.add(c.name);
          chip.classList.toggle("off");
          updateCount();
          savePrefs();
        });
        chips.appendChild(chip);
      });
      group.appendChild(chips);
      container.appendChild(group);
    });
    updateCount();
  }

  // Pick N unique characters from the pool. If pool is smaller than N,
  // duplicates are allowed (so the UI doesn't break).
  function pickSquad(n) {
    const pool = ROSTER.filter(c => enabled.has(c.name));
    if (pool.length === 0) return null;

    const result = [];
    if (pool.length >= n) {
      // Shuffle and take first n for unique picks
      const shuffled = pool.slice();
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(cryptoRandom() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, n);
    } else {
      // Pool too small — allow duplicates
      for (let i = 0; i < n; i++) {
        result.push(pool[Math.floor(cryptoRandom() * pool.length)]);
      }
      return result;
    }
  }

  function setSlot(idx, character, rerollable) {
    document.getElementById("name" + idx).textContent = character.name;
    const roleEl = document.getElementById("role" + idx);
    roleEl.textContent = character.role;
    roleEl.className = "role " + roleClass[character.role];
    roleEl.style.visibility = "visible";

    const portraitEl = document.getElementById("portrait" + idx);
    portraitEl.innerHTML = "";
    portraitEl.className = "portrait " + roleClass[character.role] + (rerollable ? " rerollable" : "");
    portraitEl.title = rerollable ? "Click to re-roll this player" : "";
    portraitEl.onclick = rerollable ? () => rollOne(idx) : null;
    portraitEl.appendChild(buildPortrait(character));
  }

  function showEmpty() {
    for (let i = 1; i <= playerCount; i++) {
      document.getElementById("name" + i).textContent = "Pool empty";
      document.getElementById("role" + i).style.visibility = "hidden";
      document.getElementById("portrait" + i).innerHTML = "?";
    }
  }

  // ── Case-opening reel animation ─────────────────────────────────────────
  const ITEM_W    = 110;   // px width of each reel card
  const PRE_ITEMS = 42;    // cards before the winner in the strip
  const ROLL_DUR  = 6200;  // ms — full roll animation
  const SINGLE_DUR = 4400; // ms — single re-roll animation

  // Easing: mostly linear (fast constant scroll) then a sharp deceleration
  function reelEase(t) {
    const split = 0.7, fast = 0.86;
    if (t < split) return (fast / split) * t;
    const u = (t - split) / (1 - split);
    return fast + (1 - fast) * (1 - Math.pow(1 - u, 5));
  }

  function buildReelStrip(winner, pool) {
    const items = [];
    for (let i = 0; i < PRE_ITEMS; i++)
      items.push(pool[Math.floor(cryptoRandom() * pool.length)]);
    items.push(winner);
    for (let i = 0; i < 12; i++)
      items.push(pool[Math.floor(cryptoRandom() * pool.length)]);
    return items;
  }

  function makeReelItemEl(character, isWinner, isBan) {
    const el = document.createElement("div");
    el.className = "reel-item" + (isWinner ? " reel-item-winner" : "");
    const p = document.createElement("div");
    p.className = "reel-item-portrait " + (isBan ? "role-banned" : roleClass[character.role]);
    p.appendChild(buildPortrait(character));
    el.appendChild(p);
    const n = document.createElement("div");
    n.className = "reel-item-name";
    n.textContent = character.name.replace(/ \((Vanguard|Duelist|Strategist)\)$/, "");
    el.appendChild(n);
    return el;
  }

  // Metallic click — short noise transient + high-freq ring, mimicking CS case scroll
  function playTick(ac, speed) {
    try {
      const now = ac.currentTime;
      const vol = Math.min(0.28, 0.05 + speed * 0.23);

      // Sharp transient: shaped noise burst through a high-pass filter
      const len = Math.ceil(ac.sampleRate * 0.014);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3);
      const noise = ac.createBufferSource();
      noise.buffer = buf;
      const hpf = ac.createBiquadFilter();
      hpf.type = "highpass";
      hpf.frequency.value = 4000;
      const noiseGain = ac.createGain();
      noiseGain.gain.value = vol * 0.55;
      noise.connect(hpf); hpf.connect(noiseGain); noiseGain.connect(ac.destination);
      noise.start(now);

      // Metallic ring: short triangle oscillator at ~2.4 kHz
      const osc = ac.createOscillator();
      osc.type = "triangle";
      osc.frequency.value = 2400;
      const oscGain = ac.createGain();
      oscGain.gain.setValueAtTime(vol * 0.45, now);
      oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.022);
      osc.connect(oscGain); oscGain.connect(ac.destination);
      osc.start(now); osc.stop(now + 0.022);
    } catch (e) {}
  }

  // Reveal "ding" — plays when the winner is highlighted after the reel stops
  function playReveal(ac, isBan) {
    try {
      const now = ac.currentTime;
      const baseFreq = isBan ? 520 : 880;

      // Primary tone: decaying sine
      const osc = ac.createOscillator();
      osc.type = "sine";
      osc.frequency.setValueAtTime(baseFreq * 0.5, now);
      osc.frequency.exponentialRampToValueAtTime(baseFreq, now + 0.06);
      const g = ac.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.linearRampToValueAtTime(0.22, now + 0.04);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 1.6);
      osc.connect(g); g.connect(ac.destination);
      osc.start(now); osc.stop(now + 1.6);

      // Shimmer harmonic an octave up
      const osc2 = ac.createOscillator();
      osc2.type = "sine";
      osc2.frequency.value = baseFreq * 2;
      const g2 = ac.createGain();
      g2.gain.setValueAtTime(0.0001, now + 0.03);
      g2.gain.linearRampToValueAtTime(0.08, now + 0.08);
      g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.9);
      osc2.connect(g2); g2.connect(ac.destination);
      osc2.start(now + 0.03); osc2.stop(now + 0.9);
    } catch (e) {}
  }

  function showReelOverlay(rows, duration, isBan, onComplete) {
    // rows: [{ label, winner, pool }]
    const overlay = document.createElement("div");
    overlay.className = "reel-overlay";

    const casesEl = document.createElement("div");
    casesEl.className = "reel-cases";
    overlay.appendChild(casesEl);

    const reelData = rows.map(row => {
      const rowEl = document.createElement("div");
      rowEl.className = "reel-row";

      if (row.label) {
        const lbl = document.createElement("span");
        lbl.className = "reel-row-label";
        lbl.textContent = row.label;
        rowEl.appendChild(lbl);
      }

      const vp = document.createElement("div");
      vp.className = "reel-viewport";

      const cl = document.createElement("div");
      cl.className = "reel-center-line";
      vp.appendChild(cl);

      const strip = document.createElement("div");
      strip.className = "reel-strip";
      buildReelStrip(row.winner, row.pool).forEach((char, i) =>
        strip.appendChild(makeReelItemEl(char, i === PRE_ITEMS, isBan))
      );
      vp.appendChild(strip);

      ["reel-fade reel-fade-left", "reel-fade reel-fade-right"].forEach(cls => {
        const f = document.createElement("div");
        f.className = cls;
        vp.appendChild(f);
      });

      rowEl.appendChild(vp);
      casesEl.appendChild(rowEl);
      return { strip, vp };
    });

    document.body.appendChild(overlay);

    // Two rAF frames to ensure layout is measured after paint
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const targets = reelData.map(({ vp }) =>
        -(PRE_ITEMS * ITEM_W + ITEM_W / 2 - vp.offsetWidth / 2)
      );

      // One shared AudioContext for all ticks in this animation
      let ac = null;
      try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}

      const startTime = performance.now();
      let lastTickIdx = -1;

      (function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const p = reelEase(t);

        // Fire a tick each time the reel crosses an item boundary
        const tickIdx = Math.floor(Math.abs(p * targets[0]) / ITEM_W);
        if (ac && tickIdx !== lastTickIdx) {
          lastTickIdx = tickIdx;
          playTick(ac, 1 - t);
        }

        reelData.forEach(({ strip }, i) => {
          strip.style.transform = "translateX(" + (p * targets[i]) + "px)";
        });

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          const hlClass = isBan ? "reel-item-ban-highlighted" : "reel-item-highlighted";
          reelData.forEach(({ strip }) =>
            strip.querySelectorAll(".reel-item-winner").forEach(el => el.classList.add(hlClass))
          );
          if (ac) { playReveal(ac, isBan); setTimeout(() => ac.close().catch(() => {}), 2000); }
          setTimeout(() => {
            overlay.classList.add("fading");
            setTimeout(() => { overlay.remove(); onComplete(); }, 450);
          }, 1500);
        }
      })(performance.now());
    }));
  }

  // ── Simple (original) flicker animations ────────────────────────────────
  function rollSimple() {
    const squad = pickSquad(playerCount);
    if (!squad) { showEmpty(); return; }
    const slots = [];
    for (let i = 1; i <= playerCount; i++) {
      const s = document.getElementById("slot" + i);
      s.classList.add("spinning");
      slots.push(s);
    }
    let ticks = 0;
    const interval = setInterval(() => {
      const pool = ROSTER.filter(c => enabled.has(c.name));
      if (pool.length > 0)
        for (let i = 1; i <= playerCount; i++)
          setSlot(i, pool[Math.floor(cryptoRandom() * pool.length)], false);
      if (++ticks >= 8) {
        clearInterval(interval);
        currentSquad = squad.slice();
        squad.forEach((c, i) => setSlot(i + 1, c, true));
        slots.forEach(s => s.classList.remove("spinning"));
      }
    }, 80);
  }

  function rollOneSimple(playerIdx) {
    const pool = ROSTER.filter(c => enabled.has(c.name));
    if (pool.length === 0) return;
    const others = new Set(currentSquad.filter((_, i) => i !== playerIdx - 1).map(c => c.name));
    const exclusive = pool.filter(c => !others.has(c.name));
    const pickFrom = exclusive.length > 0 ? exclusive : pool;
    const current = currentSquad[playerIdx - 1];
    const candidates = pickFrom.filter(c => !current || c.name !== current.name);
    const finalPool = candidates.length > 0 ? candidates : pickFrom;
    const picked = finalPool[Math.floor(cryptoRandom() * finalPool.length)];
    const slotEl = document.getElementById("slot" + playerIdx);
    slotEl.classList.add("spinning");
    document.getElementById("portrait" + playerIdx).onclick = null;
    let ticks = 0;
    const interval = setInterval(() => {
      setSlot(playerIdx, pickFrom[Math.floor(cryptoRandom() * pickFrom.length)], false);
      if (++ticks >= 8) {
        clearInterval(interval);
        currentSquad[playerIdx - 1] = picked;
        setSlot(playerIdx, picked, true);
        slotEl.classList.remove("spinning");
      }
    }, 80);
  }

  // ── CS reel animations ───────────────────────────────────────────────────
  function rollCS() {
    const squad = pickSquad(playerCount);
    if (!squad) { showEmpty(); return; }
    const pool = ROSTER.filter(c => enabled.has(c.name));
    showReelOverlay(
      squad.map((winner, i) => ({ label: "Player " + (i + 1), winner, pool })),
      ROLL_DUR, false,
      () => { currentSquad = squad.slice(); squad.forEach((c, i) => setSlot(i + 1, c, true)); }
    );
  }

  function rollOneCS(playerIdx) {
    const pool = ROSTER.filter(c => enabled.has(c.name));
    if (pool.length === 0) return;
    const others = new Set(currentSquad.filter((_, i) => i !== playerIdx - 1).map(c => c.name));
    const exclusive = pool.filter(c => !others.has(c.name));
    const pickFrom = exclusive.length > 0 ? exclusive : pool;
    const current = currentSquad[playerIdx - 1];
    const candidates = pickFrom.filter(c => !current || c.name !== current.name);
    const finalPool = candidates.length > 0 ? candidates : pickFrom;
    const picked = finalPool[Math.floor(cryptoRandom() * finalPool.length)];
    document.getElementById("portrait" + playerIdx).onclick = null;
    showReelOverlay(
      [{ label: "Player " + playerIdx, winner: picked, pool: pickFrom }],
      SINGLE_DUR, false,
      () => { currentSquad[playerIdx - 1] = picked; setSlot(playerIdx, picked, true); }
    );
  }

  // ── Dispatchers ──────────────────────────────────────────────────────────
  function roll()            { csMode ? rollCS()             : rollSimple();          }
  function rollOne(idx)      { csMode ? rollOneCS(idx)       : rollOneSimple(idx);    }

  // Ban roster — deduplicated by base name so Deadpool's role variants collapse to one entry
  const BAN_ROSTER = [];
  const _seenBanNames = new Set();
  ROSTER.forEach(c => {
    const baseName = c.name.replace(/ \((Vanguard|Duelist|Strategist)\)$/, "");
    if (!_seenBanNames.has(baseName)) {
      _seenBanNames.add(baseName);
      BAN_ROSTER.push({ name: baseName, role: c.role, img: c.img });
    }
  });

  let currentBans = [];

  function renderBanSlots() {
    const container = document.getElementById("banSlotsContainer");
    container.innerHTML = "";
    for (let i = 1; i <= 3; i++) {
      const slot = document.createElement("div");
      slot.className = "ban-slot";
      slot.id = "banSlot" + i;
      slot.innerHTML =
        '<p class="ban-label">Ban ' + i + '</p>' +
        '<div class="portrait role-banned" id="banPortrait' + i + '">?</div>' +
        '<p class="name" id="banName' + i + '">Press randomize</p>' +
        '<div><span class="role" id="banRole' + i + '" style="visibility:hidden">—</span></div>';
      container.appendChild(slot);
    }
  }

  function setBanSlot(idx, character, rerollable) {
    document.getElementById("banName" + idx).textContent = character.name;
    const roleEl = document.getElementById("banRole" + idx);
    roleEl.textContent = character.role;
    roleEl.className = "role " + roleClass[character.role];
    roleEl.style.visibility = "visible";

    const portraitEl = document.getElementById("banPortrait" + idx);
    portraitEl.innerHTML = "";
    portraitEl.className = "portrait role-banned" + (rerollable ? " rerollable" : "");
    portraitEl.title = rerollable ? "Click to re-roll this ban" : "";
    portraitEl.onclick = rerollable ? () => rollOneBan(idx) : null;
    portraitEl.appendChild(buildPortrait(character));
  }

  function rollBansSimple() {
    const shuffled = BAN_ROSTER.slice();
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(cryptoRandom() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    const picks = shuffled.slice(0, 3);
    for (let i = 1; i <= 3; i++) document.getElementById("banSlot" + i).classList.add("spinning");
    let ticks = 0;
    const interval = setInterval(() => {
      for (let i = 1; i <= 3; i++)
        setBanSlot(i, BAN_ROSTER[Math.floor(cryptoRandom() * BAN_ROSTER.length)], false);
      if (++ticks >= 8) {
        clearInterval(interval);
        currentBans = picks.slice();
        picks.forEach((c, i) => setBanSlot(i + 1, c, true));
        for (let i = 1; i <= 3; i++) document.getElementById("banSlot" + i).classList.remove("spinning");
      }
    }, 80);
  }

  function rollOneBanSimple(banIdx) {
    const others = new Set(currentBans.filter((_, i) => i !== banIdx - 1).map(c => c.name));
    const pickFrom = BAN_ROSTER.filter(c => !others.has(c.name));
    const current = currentBans[banIdx - 1];
    const candidates = pickFrom.filter(c => !current || c.name !== current.name);
    const finalPool = candidates.length > 0 ? candidates : pickFrom;
    const picked = finalPool[Math.floor(cryptoRandom() * finalPool.length)];
    const slotEl = document.getElementById("banSlot" + banIdx);
    slotEl.classList.add("spinning");
    document.getElementById("banPortrait" + banIdx).onclick = null;
    let ticks = 0;
    const interval = setInterval(() => {
      setBanSlot(banIdx, BAN_ROSTER[Math.floor(cryptoRandom() * BAN_ROSTER.length)], false);
      if (++ticks >= 8) {
        clearInterval(interval);
        currentBans[banIdx - 1] = picked;
        setBanSlot(banIdx, picked, true);
        slotEl.classList.remove("spinning");
      }
    }, 80);
  }

  function rollBansCS() {
    const shuffled = BAN_ROSTER.slice();
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(cryptoRandom() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    const picks = shuffled.slice(0, 3);
    showReelOverlay(
      picks.map((winner, i) => ({ label: "Ban " + (i + 1), winner, pool: BAN_ROSTER })),
      ROLL_DUR, true,
      () => { currentBans = picks.slice(); picks.forEach((c, i) => setBanSlot(i + 1, c, true)); }
    );
  }

  function rollOneBanCS(banIdx) {
    const others = new Set(currentBans.filter((_, i) => i !== banIdx - 1).map(c => c.name));
    const pickFrom = BAN_ROSTER.filter(c => !others.has(c.name));
    const current = currentBans[banIdx - 1];
    const candidates = pickFrom.filter(c => !current || c.name !== current.name);
    const finalPool = candidates.length > 0 ? candidates : pickFrom;
    const picked = finalPool[Math.floor(cryptoRandom() * finalPool.length)];
    document.getElementById("banPortrait" + banIdx).onclick = null;
    showReelOverlay(
      [{ label: "Ban " + banIdx, winner: picked, pool: pickFrom }],
      SINGLE_DUR, true,
      () => { currentBans[banIdx - 1] = picked; setBanSlot(banIdx, picked, true); }
    );
  }

  function rollBans()        { csMode ? rollBansCS()          : rollBansSimple();      }
  function rollOneBan(idx)   { csMode ? rollOneBanCS(idx)     : rollOneBanSimple(idx); }

  // Tab switching
  function setupTabs() {
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("panel-" + btn.getAttribute("data-tab")).classList.add("active");
      });
    });
  }

  // Space bar works on whichever tab is active
  document.addEventListener("keydown", (e) => {
    if (e.code === "Space" && e.target.tagName !== "BUTTON" && e.target.tagName !== "INPUT") {
      e.preventDefault();
      const bansActive = document.getElementById("panel-bans").classList.contains("active");
      if (bansActive) rollBans(); else roll();
    }
  });

  document.getElementById("rollBansBtn").addEventListener("click", rollBans);

  // Player count buttons
  function setupPlayerCountButtons() {
    const buttons = document.querySelectorAll("#pcButtons .pc-btn");
    buttons.forEach(btn => {
      const count = parseInt(btn.getAttribute("data-count"), 10);
      if (count === playerCount) btn.classList.add("active");
      else btn.classList.remove("active");

      btn.addEventListener("click", () => {
        playerCount = count;
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderSlots();
        savePrefs();
      });
    });
  }

  document.getElementById("rollBtn").addEventListener("click", roll);

  document.getElementById("enableAll").addEventListener("click", () => {
    ROSTER.forEach(c => enabled.add(c.name));
    renderPool();
    savePrefs();
  });
  document.getElementById("disableAll").addEventListener("click", () => {
    enabled.clear();
    renderPool();
    savePrefs();
  });
  document.querySelectorAll("[data-role]").forEach(btn => {
    btn.addEventListener("click", () => {
      enabled.clear();
      const role = btn.getAttribute("data-role");
      ROSTER.filter(c => c.role === role).forEach(c => enabled.add(c.name));
      renderPool();
      savePrefs();
    });
  });

  // CS mode toggle
  const csModeCheck = document.getElementById("csModeCheck");
  csModeCheck.checked = csMode;
  csModeCheck.addEventListener("change", () => {
    csMode = csModeCheck.checked;
    savePrefs();
  });

  setupTabs();
  setupPlayerCountButtons();
  renderSlots();
  renderPool();
  renderBanSlots();
</script>
</body>
</html>
